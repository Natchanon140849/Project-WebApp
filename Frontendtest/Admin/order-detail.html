<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Detail</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-[#f7f4ee] text-base-content">
  <div class="drawer lg:drawer-open">
    <input id="admin-drawer" type="checkbox" class="drawer-toggle" />

    <div class="drawer-content flex flex-col">
      <div class="navbar bg-[#efe5d7]/95 border-b border-[#d8ccb9] shadow-sm px-3 lg:px-8">
        <div class="flex-none lg:hidden"><label for="admin-drawer" class="btn btn-ghost btn-circle">☰</label></div>
        <div class="flex-1"><a class="text-2xl font-extrabold text-orange-600">Order Detail</a></div>
        <div class="flex-none"><button onclick="logoutStaff()" class="btn btn-outline btn-error rounded-full">Logout</button></div>
      </div>

      <main class="p-4 lg:p-8 space-y-6">
        <div class="flex items-center justify-between flex-wrap gap-4">
          <div>
            <h1 class="text-3xl font-extrabold text-[#3d241a]">Order #1001</h1>
            <p class="text-[#6d2f1d]/70 mt-2">Table A01 · Pending</p>
          </div>
          <a href="orders.html" class="btn rounded-full bg-white border border-[#d8ccb9] text-[#6d2f1d] hover:bg-[#f7efe4]">← Back to Orders</a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
          <div class="lg:col-span-2 card bg-white border border-[#e6dac8] shadow-md rounded-[1.75rem]">
            <div class="card-body">
              <h2 class="card-title">Items</h2>
              <div class="space-y-3">
                <div class="flex justify-between border-b pb-3"><span>Chicken Rice Bowl × 2</span><span>$18</span></div>
                <div class="flex justify-between border-b pb-3"><span>Iced Cola × 1</span><span>$5</span></div>
                <div class="flex justify-between font-bold text-lg"><span>Total</span><span>$23</span></div>
              </div>
            </div>
          </div>

          <div class="card bg-white border border-[#e6dac8] shadow-md rounded-[1.75rem]">
            <div class="card-body">
              <h2 class="card-title">Actions</h2>
              <button class="btn rounded-full bg-orange-600 hover:bg-orange-700 text-white border-0">Mark Cooking</button>
              <button class="btn rounded-full bg-green-600 hover:bg-green-700 text-white border-0">Mark Served</button>
              <button class="btn rounded-full bg-slate-700 hover:bg-slate-800 text-white border-0">Close Order</button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div class="drawer-side">
      <label for="admin-drawer" class="drawer-overlay"></label>
      <aside class="min-h-full w-72 bg-[#efe5d7] border-r border-[#d8ccb9] p-4">
        <div class="text-2xl font-extrabold text-orange-600 mb-6">Admin Panel</div>
        <div id="admin-sidebar"></div>
      </aside>
    </div>
  </div>

  <script src="../app.js"></script>
  <script>
    requireStaff("admin");
    setupAdminSidebar();
    document.getElementById("admin-sidebar").innerHTML = adminSidebar("orders.html");
  </script>
</body>
</html>
