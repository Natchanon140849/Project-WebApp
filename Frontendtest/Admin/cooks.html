<!doctype html>
<html lang="th" data-theme="cupcake">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>พนักงานครัว</title>

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    :root {
      --fh-orange: #ea580c;
      --fh-orange-hover: #c2410c;
      --fh-brown: #6d2f1d;
    }

    #theme-toggle { display: none !important; }

    .btn-primary {
      background-color: var(--fh-orange) !important;
      border-color: var(--fh-orange) !important;
      color: #fff !important;
    }

    .btn-primary:hover {
      background-color: var(--fh-orange-hover) !important;
      border-color: var(--fh-orange-hover) !important;
    }

    .text-primary { color: var(--fh-orange) !important; }
    .bg-primary { background-color: var(--fh-orange) !important; }

    #logout {
      background-color: transparent !important;
      border-color: #c8b39b !important;
      color: var(--fh-brown) !important;
      border-width: 1px !important;
      border-radius: 9999px !important;
    }

    #logout:hover { background-color: #f7efe4 !important; }
  </style>
</head>

<body class="min-h-screen bg-[#f7f4ee] text-base-content" data-page="cooks">

  <div class="drawer">
    <input id="admin-drawer" type="checkbox" class="drawer-toggle" />

    <!-- MAIN -->
    <div class="drawer-content flex flex-col min-h-screen">

      <!-- NAV -->
      <div class="navbar sticky top-0 z-50 bg-[#efe5d7]/95 backdrop-blur border-b border-[#d8ccb9] px-3 lg:px-8 min-h-16 shadow-sm">
        <div class="flex-none">
          <label for="admin-drawer" class="btn btn-ghost btn-square">☰</label>
        </div>

        <div class="flex-1 items-center gap-3">
          <a href="./dashboard_Admin.html" class="text-2xl lg:text-3xl font-extrabold tracking-tight text-orange-600">Foodie House</a>
          <span class="ml-2 text-sm text-base-content/60">/ พนักงาน</span>
        </div>

        <div class="flex-none gap-2">
          <button class="btn btn-ghost btn-sm">ธีม</button>
          <a href="./login.html" class="btn btn-primary btn-sm">ออก</a>
        </div>
      </div>

      <!-- CONTENT -->
      <main class="p-4 lg:p-8 flex-1">
        <div class="max-w-7xl mx-auto space-y-6">

          <!-- HEADER -->
          <div class="flex justify-between items-center">
            <h1 class="text-2xl font-bold">พนักงานครัว</h1>
            <button id="btn-add" class="btn btn-primary btn-sm">+ เพิ่ม</button>
          </div>

          <!-- TABLE -->
          <div class="card bg-white border border-[#e6dac8] shadow-sm">
            <div class="card-body p-0">

              <div class="overflow-x-auto">
                <table class="table table-zebra">
                  <thead>
                    <tr>
                      <th>รหัส</th>
                      <th>ชื่อ</th>
                      <th>กะ</th>
                      <th>สถานะ</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody id="cooks"></tbody>
                </table>
              </div>

            </div>
          </div>

        </div>
      </main>
    </div>

    <!-- Sidebar -->
    <div class="drawer-side">
      <label for="admin-drawer" aria-label="close sidebar" class="drawer-overlay lg:hidden"></label>
      <aside class="min-h-full w-72 border-r border-[#d8ccb9] bg-white">
        <div class="border-b border-[#d8ccb9] px-5 py-6">
          <p class="text-xs uppercase tracking-wide text-base-content/50">พื้นที่ผู้ดูแลระบบ</p>
        </div>

        <ul class="menu gap-1 p-4">
          <li><a class="nav-link rounded-xl" data-nav="dashboard" href="./dashboard_Admin.html">แดชบอร์ด</a></li>
          <li><a class="nav-link rounded-xl" data-nav="orders" href="./orders.html">ออเดอร์</a></li>
          <li><a class="nav-link rounded-xl" data-nav="menu-items" href="./menu-items.html">เมนูอาหาร</a></li>
          <li><a class="nav-link rounded-xl" data-nav="cooks" href="./cooks.html">พนักงานครัว</a></li>
          <li><a class="nav-link rounded-xl" data-nav="attendance" href="./attendance.html">เวลาเข้างาน</a></li>
          <li><a class="nav-link rounded-xl" data-nav="payments" href="./payments.html">การชำระเงิน</a></li>
          <li><a class="nav-link rounded-xl" data-nav="reviews" href="./reviews.html">รีวิว</a></li>
          <li><a class="nav-link rounded-xl" data-nav="profile" href="./profile.html">โปรไฟล์</a></li>
        </ul>
      </aside>
    </div>
  </div>

  </div>

  <!-- MODAL -->
  <dialog id="modal" class="modal">
    <div class="modal-box">
      <h3 class="font-bold text-lg">เพิ่มพนักงาน</h3>

      <div class="space-y-3 mt-3">
        <input id="cook-name" class="input input-bordered w-full" placeholder="ชื่อ" />
        <select id="cook-shift" class="select select-bordered w-full">
          <option>เช้า</option>
          <option>บ่าย</option>
          <option>ดึก</option>
        </select>
      </div>

      <div class="modal-action">
        <button class="btn" onclick="modal.close()">ยกเลิก</button>
        <button class="btn btn-primary" id="save-cook">บันทึก</button>
      </div>
    </div>
  </dialog>

  <script src="./admin-sidebar.js"></script>
  <script>
    function requireAuth() {
      if (!localStorage.getItem('adminSession')) {
        window.location.href = './login.html';
        return false;
      }
      return true;
    }

    function badge(s) {
      return `<span class="badge ${s === 'Active' ? 'badge-success' : 'badge-ghost'}">${s}</span>`;
    }

    const data = [
      { code: 'CK-01', name: 'กานต์', shift: 'เช้า', status: 'Active' },
      { code: 'CK-02', name: 'เมย์', shift: 'บ่าย', status: 'Active' },
      { code: 'CK-03', name: 'นนท์', shift: 'ดึก', status: 'Inactive' }
    ];

    function render() {
      document.getElementById('cooks').innerHTML = data.map(c => `
  <tr>
    <td class="font-mono">${c.code}</td>
    <td>${c.name}</td>
    <td>${c.shift}</td>
    <td>${badge(c.status)}</td>
    <td class="text-right">
      <button class="btn btn-xs btn-ghost">แก้ไข</button>
    </td>
  </tr>
 `).join('');
    }


    function generateCookCode() {
      const next = data.length + 1;
      return `CK-${String(next).padStart(2, '0')}`;
    }

    if (requireAuth()) {
      render();

      document.getElementById('btn-add').onclick = () => {
        document.getElementById('cook-name').value = '';
        document.getElementById('cook-shift').value = 'เช้า';
        modal.showModal();
      };

      document.getElementById('save-cook').onclick = () => {
        const name = document.getElementById('cook-name').value.trim();
        const shift = document.getElementById('cook-shift').value;

        if (!name) {
          alert('กรุณากรอกชื่อพนักงาน');
          return;
        }

        data.push({
          code: generateCookCode(),
          name,
          shift,
          status: 'Active'
        });

        render();
        modal.close();
      };
    }

    function setActiveNav() {
      const page = document.body.dataset.page;

      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.remove('bg-orange-600', 'text-white');

        if (link.dataset.nav === page) {
          link.classList.add('bg-orange-600', 'text-white');
        }
      });
    }

    setActiveNav();
  </script>

</body>

</html>
