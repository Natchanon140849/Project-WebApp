<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    :root{--fh-bg:#f7f4ee;--fh-soft:#efe5d7;--fh-line:#d8ccb9;--fh-line-2:#e6dac8;--fh-brown:#6d2f1d;--fh-brown-2:#3d241a;--fh-orange:#ea580c;--fh-orange-2:#c2410c}
    body{background:var(--fh-bg);color:var(--fh-brown-2)}
    .fh-top{background:#efe5d7f2;border-bottom:1px solid var(--fh-line);backdrop-filter:blur(10px)}
    .fh-card{background:#fff;border:1px solid var(--fh-line-2);border-radius:1.75rem;box-shadow:0 10px 24px rgba(61,36,26,.06)}
    .fh-btn{background:var(--fh-orange)!important;border:none!important;color:#fff!important;border-radius:9999px}
    .fh-btn:hover{background:var(--fh-orange-2)!important}
  </style>
</head>
<body class="min-h-screen">
  <!-- top bar -->
  <div class="navbar sticky top-0 z-50 px-4 lg:px-8 min-h-16 fh-top">
    <div class="flex-1 items-center gap-2"><a href="cart.html" class="btn btn-ghost btn-circle text-xl text-[#6d2f1d]">‹</a><div class="text-2xl font-extrabold text-orange-600">Payment</div></div>
    <div class="flex-none">
      <a href="cart.html" class="btn btn-ghost btn-circle hover:bg-orange-100">
        <div class="indicator">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#6d2f1d]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4m1.6 8L5.4 5M7 13l-1.3 1.3A1 1 0 006.4 16H19m-12 0a2 2 0 104 0m6 0a2 2 0 104 0"/></svg>
          <span class="badge badge-sm indicator-item bg-orange-600 text-white border-0 js-cart-count">0</span>
        </div>
      </a>
    </div>
  </div>

  <main class="max-w-6xl mx-auto p-4 lg:p-8 grid lg:grid-cols-2 gap-6">
    <!-- summary -->
    <section class="fh-card">
      <div class="p-6">
        <h1 class="text-3xl font-extrabold text-[#3d241a]">Payment Summary</h1>
        <div id="empty" class="hidden mt-4"><p class="text-[#6d2f1d]/70">Your cart is empty.</p><a href="customer-dashboard.html" class="btn fh-btn mt-3">Back to Menu</a></div>
        <div id="content" class="space-y-4 mt-4">
          <div class="overflow-x-auto">
            <table class="table">
              <thead><tr><th>Item</th><th>Qty</th><th>Price</th></tr></thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>
          <div class="text-right text-2xl font-extrabold text-orange-600">Total: <span id="sum">0 THB</span></div>
        </div>
      </div>
    </section>

    <!-- method -->
    <section class="fh-card">
      <div class="p-6 space-y-4">
        <h2 class="text-3xl font-extrabold text-[#3d241a]">Choose Payment Method</h2>

        <div class="grid sm:grid-cols-3 gap-3">
          <button id="mCash" class="btn h-20 rounded-2xl border-2 border-orange-600 bg-orange-50 text-[#3d241a]">💵<br>Cash</button>
          <button id="mCard" class="btn h-20 rounded-2xl bg-white text-[#3d241a] border border-[#d8ccb9]">💳<br>Card</button>
          <button id="mQR" class="btn h-20 rounded-2xl bg-white text-[#3d241a] border border-[#d8ccb9]">📱<br>QR Payment</button>
        </div>

        <div class="rounded-2xl border border-[#e6dac8] bg-[#faf6ef] p-4">
          <div id="gTitle" class="font-bold text-[#3d241a]">Cash Payment</div>
          <div id="gText" class="text-sm text-[#6d2f1d] mt-1"></div>
        </div>

        <div id="cashBox" class="space-y-3">
          <input id="cashName" class="input input-bordered w-full rounded-2xl border-[#d8ccb9]" placeholder="Customer name">
          <label class="label cursor-pointer justify-start gap-3"><input id="cashOk" type="checkbox" class="checkbox"><span class="label-text">I will pay at the counter.</span></label>
        </div>

        <div id="cardBox" class="space-y-3 hidden">
          <input id="cardName" class="input input-bordered w-full rounded-2xl border-[#d8ccb9]" placeholder="Cardholder name">
          <input id="cardNo" class="input input-bordered w-full rounded-2xl border-[#d8ccb9]" placeholder="1234 5678 9012 3456" maxlength="19">
          <div class="grid grid-cols-2 gap-3">
            <input id="cardExp" class="input input-bordered rounded-2xl border-[#d8ccb9]" placeholder="MM/YY" maxlength="5">
            <input id="cardCvv" class="input input-bordered rounded-2xl border-[#d8ccb9]" placeholder="CVV" maxlength="4">
          </div>
        </div>

        <div id="qrBox" class="space-y-3 hidden">
          <div class="rounded-2xl border border-[#d8ccb9] bg-[#faf6ef] p-4">
            <div class="flex justify-between items-center gap-4">
              <div><div class="font-bold text-[#3d241a]">Foodie House QR</div><div class="text-sm text-[#8b6b5c]">Scan with your banking app</div><div class="text-sm mt-2 text-[#6d2f1d]">Ref: <span id="qrRef"></span></div><div class="text-sm text-[#6d2f1d]">Amount: <span id="qrAmt"></span></div></div>
              <div class="w-24 h-24 rounded-xl border-4 border-black bg-[linear-gradient(45deg,#000_25%,transparent_25%,transparent_50%,#000_50%,#000_75%,transparent_75%,transparent)] bg-[length:16px_16px]"></div>
            </div>
          </div>
          <input id="qrName" class="input input-bordered w-full rounded-2xl border-[#d8ccb9]" placeholder="Payer name">
          <label class="label cursor-pointer justify-start gap-3"><input id="qrOk" type="checkbox" class="checkbox"><span class="label-text">I completed the QR transfer.</span></label>
        </div>

        <button id="pay" class="btn fh-btn w-full">Confirm Payment</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
  <script>
    const empty=document.getElementById("empty"),content=document.getElementById("content"),tbody=document.getElementById("tbody"),sum=document.getElementById("sum"),gTitle=document.getElementById("gTitle"),gText=document.getElementById("gText"),qrRef=document.getElementById("qrRef"),qrAmt=document.getElementById("qrAmt"),cashBox=document.getElementById("cashBox"),cardBox=document.getElementById("cardBox"),qrBox=document.getElementById("qrBox"),mCash=document.getElementById("mCash"),mCard=document.getElementById("mCard"),mQR=document.getElementById("mQR");
    let method="Cash";

    function render(){
      const c=normCart();empty.classList.toggle("hidden",!!c.length);content.classList.toggle("hidden",!c.length);
      tbody.innerHTML=c.map(x=>`<tr><td><div class="font-semibold">${itemLabel(x)}</div>${itemNotes(x).length?`<div class="text-xs opacity-70 mt-1">${itemNotes(x).join(" • ")}</div>`:""}</td><td>${x.qty}</td><td>${money(x.totalPrice)}</td></tr>`).join("");
      const total=c.reduce((s,x)=>s+x.totalPrice,0);sum.textContent=money(total);qrAmt.textContent=money(total);qrRef.textContent=`FH-${String(Date.now()).slice(-6)}`;updateBadges();
    }
    function btnState(el,on){el.className=`btn h-20 rounded-2xl text-[#3d241a] ${on?'border-2 border-orange-600 bg-orange-50':'bg-white border border-[#d8ccb9]'}`;}
    function pick(m){
      method=m;btnState(mCash,m==="Cash");btnState(mCard,m==="Card");btnState(mQR,m==="QR Payment");
      cashBox.classList.toggle("hidden",m!=="Cash");cardBox.classList.toggle("hidden",m!=="Card");qrBox.classList.toggle("hidden",m!=="QR Payment");
      if(m==="Cash"){gTitle.textContent="Cash Payment";gText.innerHTML="1. Confirm order.<br>2. Pay at the counter.<br>3. Pick up when ready."}
      if(m==="Card"){gTitle.textContent="Card Payment";gText.innerHTML="1. Enter card details.<br>2. Check your information.<br>3. Confirm payment."}
      if(m==="QR Payment"){gTitle.textContent="QR Payment";gText.innerHTML="1. Scan QR with banking app.<br>2. Transfer exact amount.<br>3. Tick the checkbox and confirm."}
    }

    const digits=v=>v.replace(/\D/g,"");
    cardNo.addEventListener("input",e=>e.target.value=digits(e.target.value).slice(0,16).replace(/(.{4})/g,"$1 ").trim());
    cardExp.addEventListener("input",e=>{const d=digits(e.target.value).slice(0,4);e.target.value=d.length>2?`${d.slice(0,2)}/${d.slice(2)}`:d});
    cardCvv.addEventListener("input",e=>e.target.value=digits(e.target.value).slice(0,4));

    function check(){
      if(!normCart().length)return alert("Your cart is empty."),null;
      if(method==="Cash"){
        if(!cashName.value.trim())return alert("Please enter your name."),null;
        if(!cashOk.checked)return alert("Please confirm counter payment."),null;
        return{summary:`Cash - ${cashName.value.trim()}`};
      }
      if(method==="Card"){
        const no=digits(cardNo.value);
        if(!cardName.value.trim())return alert("Please enter cardholder name."),null;
        if(!/^\d{16}$/.test(no))return alert("Please enter a valid 16-digit card number."),null;
        if(!/^(0[1-9]|1[0-2])\/\d{2}$/.test(cardExp.value.trim()))return alert("Please enter expiry in MM/YY format."),null;
        if(!/^\d{3,4}$/.test(cardCvv.value.trim()))return alert("Please enter a valid CVV."),null;
        return{summary:`Card - **** **** **** ${no.slice(-4)}`};
      }
      if(method==="QR Payment"){
        if(!qrName.value.trim())return alert("Please enter payer name."),null;
        if(!qrOk.checked)return alert("Please confirm QR transfer."),null;
        return{summary:`QR Payment - ${qrName.value.trim()} - ${qrRef.textContent}`};
      }
    }

    pay.onclick=()=>{const info=check();if(!info)return;const order=pushOrder(method,info);if(!order)return;alert(`Payment successful!\nOrder ID: ${order.id}\nMethod: ${method}`);location.href="my-orders.html"};
    mCash.onclick=()=>pick("Cash");mCard.onclick=()=>pick("Card");mQR.onclick=()=>pick("QR Payment");
    render();pick("Cash");
  </script>
</body>
</html>
