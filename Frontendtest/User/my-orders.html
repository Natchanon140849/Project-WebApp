<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-[#f7f4ee]">
  <div class="navbar bg-[#efe5d7]/95 border-b border-[#d8ccb9] px-3 lg:px-8 shadow-sm">
    <div class="flex-1"><a class="text-2xl font-extrabold text-orange-600">My Orders</a></div>
    <div class="flex-none gap-2">
      <a href="customer-dashboard.html" class="btn rounded-full bg-white border border-[#d8ccb9] text-[#6d2f1d]">Back</a>
      <button onclick="logoutCustomer()" class="btn btn-outline btn-error rounded-full">Logout</button>
    </div>
  </div>

  <main class="max-w-5xl mx-auto p-4 lg:p-8">
    <div class="card bg-white border border-[#e6dac8] shadow-md rounded-[1.75rem]">
      <div class="card-body">
        <h1 class="text-3xl font-extrabold text-[#3d241a]">Recent Orders</h1>
        <div class="overflow-x-auto">
          <table class="table">
            <thead>
              <tr><th>Order</th><th>Status</th><th>Total</th><th></th></tr>
            </thead>
            <tbody>
              <tr>
                <td>#1001</td>
                <td><span class="badge bg-orange-100 text-orange-700 border-0">Preparing</span></td>
                <td>$45</td>
                <td><a href="order-detail.html" class="btn btn-xs rounded-full bg-orange-600 text-white border-0">View</a></td>
              </tr>
              <tr>
                <td>#1002</td>
                <td><span class="badge bg-green-100 text-green-700 border-0">Served</span></td>
                <td>$32</td>
                <td><a href="order-detail.html" class="btn btn-xs rounded-full bg-orange-600 text-white border-0">View</a></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="../app.js"></script>
  <script>
    requireCustomer();
  </script>
</body>
</html>
