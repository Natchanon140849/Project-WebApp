<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-[#f7f4ee] text-base-content">

  <!-- Navbar -->
  <div class="navbar sticky top-0 z-50 bg-[#efe5d7]/95 backdrop-blur border-b border-[#d8ccb9] px-3 lg:px-8 min-h-16 shadow-sm">
    <div class="flex-1 items-center gap-3">
      <button class="btn btn-ghost btn-circle text-xl">☰</button>
      <a class="text-2xl lg:text-3xl font-extrabold tracking-tight text-orange-600">
        Foodie House
      </a>
    </div>

    <div class="hidden md:flex flex-1 max-w-xl">
      <label class="input input-bordered rounded-full flex items-center gap-2 w-full bg-white border-[#d8ccb9] shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 opacity-60" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35m1.85-5.15a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input type="text" class="grow" placeholder="Search menu..." />
      </label>
    </div>

    <div class="flex-none gap-2">
      <div class="hidden sm:flex items-center gap-2 mr-2">
        <span id="welcomeName" class="text-sm font-semibold text-[#6d2f1d]"></span>
        <span id="tableBadge" class="badge bg-orange-100 text-orange-700 border-0"></span>
      </div>

      <button class="btn btn-ghost btn-circle hover:bg-orange-100">
        <div class="indicator">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#6d2f1d]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4m1.6 8L5.4 5M7 13l-1.293 1.293A1 1 0 006.414 16H19m-12 0a2 2 0 104 0m6 0a2 2 0 104 0" />
          </svg>
          <span class="badge badge-sm indicator-item bg-orange-600 text-white border-0">3</span>
        </div>
      </button>

      <button onclick="logoutCustomer()" class="btn btn-outline btn-error rounded-full">
        Logout
      </button>
    </div>
  </div>

  <div class="w-full px-3 lg:px-8 py-5 space-y-8">

    <!-- Hero -->
    <section class="relative max-w-[1800px] mx-auto overflow-hidden rounded-[2rem] min-h-[380px] lg:min-h-[520px] border border-[#dccdb8] shadow-xl">
      <div
        class="absolute inset-0 bg-cover bg-center"
        style="background-image: url('https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=1800&auto=format&fit=crop');"
      ></div>

      <div class="absolute inset-0 bg-gradient-to-r from-[#4a1d11]/80 via-[#5b2517]/45 to-[#000]/20"></div>

      <div class="relative z-10 flex h-full min-h-[380px] lg:min-h-[520px] items-center px-6 md:px-10 lg:px-16">
        <div class="max-w-4xl text-white">
          <p class="mb-4 text-sm md:text-base font-semibold uppercase tracking-[0.35em] text-amber-300">
            Foodie House Specials
          </p>

          <h1 class="text-4xl md:text-6xl xl:text-7xl font-extrabold leading-none drop-shadow-lg">
            ORDER YOUR
            <span class="block text-amber-300">FAVORITE FOOD</span>
          </h1>

          <p class="mt-5 max-w-2xl text-sm md:text-lg text-white/85">
            Discover delicious dishes, refreshing drinks, and sweet desserts in one place.
            Fast ordering, beautiful menu display, and a modern dining experience.
          </p>
        </div>
      </div>
    </section>

    <!-- Categories -->
    <section class="max-w-7xl mx-auto bg-[#f3eadc] border border-[#e3d7c5] rounded-[1.75rem] px-4 lg:px-8 py-5 shadow-sm">
      <div id="categoryTabs" class="flex justify-center gap-6 overflow-x-auto whitespace-nowrap pb-2"></div>
    </section>

    <!-- Menu -->
    <section class="max-w-7xl mx-auto">
      <div class="text-center mb-6">
        <h2 id="menuTitle" class="text-2xl md:text-3xl font-extrabold text-[#3d241a]">Rice Dishes</h2>
        <p id="menuSubtitle" class="text-sm text-[#6d2f1d]/65 mt-1">Delicious rice-based meals</p>
      </div>

      <div class="flex justify-center">
        <div id="menuGrid" class="flex flex-wrap justify-center gap-8"></div>
      </div>
    </section>

  </div>

  <script src="app-auth.js"></script>
  <script>
    const customer = requireCustomer();

    if (customer) {
      document.getElementById("welcomeName").textContent = `Hi, ${customer.username}`;
      document.getElementById("tableBadge").textContent = `Table ${customer.tableId}`;
    }

    const categories = [
      { key: "member", label: "Member Specials", icon: "🎁", subtitle: "Exclusive deals for members" },
      { key: "limited", label: "Limited Offers", icon: "⏰", subtitle: "Only available for a short time" },
      { key: "hot", label: "Hot Deals", icon: "🔥", subtitle: "Trending promotions and discounts" },
      { key: "combo", label: "Combo Sets", icon: "🍱", subtitle: "Popular combo meals selected for you" },
      { key: "rice", label: "Rice Dishes", icon: "🍚", subtitle: "Delicious rice-based meals" },
      { key: "burger", label: "Burgers", icon: "🍔", subtitle: "Juicy burgers you will love" },
      { key: "chicken", label: "Chicken Sets", icon: "🍗", subtitle: "Crispy and tasty chicken meals" },
      { key: "breakfast", label: "Breakfast", icon: "☀️", subtitle: "Great meals to start your day" },
      { key: "snacks", label: "Snacks", icon: "🍟", subtitle: "Perfect bites for anytime" },
      { key: "drinks", label: "Drinks", icon: "🥤", subtitle: "Refreshing beverages and desserts" }
    ];

    const menuData = {
      rice: [
        {
          name: "Chicken Rice Bowl",
          price: 79,
          desc: "Crispy chicken over rice",
          image: "https://images.unsplash.com/photo-1512058564366-18510be2db19?q=80&w=900&auto=format&fit=crop",
          rating: 4.4,
          tag: "Rice"
        },
        {
          name: "Grilled Chicken Rice",
          price: 79,
          desc: "Tender grilled chicken with sauce",
          image: "https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=900&auto=format&fit=crop",
          rating: 4.3,
          tag: "New"
        },
        {
          name: "Salted Chicken Rice",
          price: 69,
          desc: "Lightly seasoned chicken bowl",
          image: "https://images.unsplash.com/photo-1515003197210-e0cd71810b5f?q=80&w=900&auto=format&fit=crop",
          rating: 4.2,
          tag: "Rice"
        }
      ],
      burger: [
        {
          name: "Whopper Style Burger",
          price: 149,
          desc: "Signature grilled burger",
          image: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=900&auto=format&fit=crop",
          rating: 4.8,
          tag: "Signature"
        },
        {
          name: "BBQ Bacon Burger",
          price: 169,
          desc: "Smoky BBQ with crispy bacon",
          image: "https://images.unsplash.com/photo-1550547660-d9450f859349?q=80&w=900&auto=format&fit=crop",
          rating: 4.7,
          tag: "BBQ"
        },
        {
          name: "Chicken Burger",
          price: 129,
          desc: "Crispy chicken burger",
          image: "https://images.unsplash.com/photo-1606755962773-d324e2d53f9c?q=80&w=900&auto=format&fit=crop",
          rating: 4.5,
          tag: "Crispy"
        }
      ],
      drinks: [
        {
          name: "Iced Cola",
          price: 35,
          desc: "Refreshing soft drink",
          image: "https://images.unsplash.com/photo-1629203851122-3726ecdf080e?q=80&w=900&auto=format&fit=crop",
          rating: 4.2,
          tag: "Cold"
        },
        {
          name: "Chocolate Shake",
          price: 59,
          desc: "Creamy chocolate milkshake",
          image: "https://images.unsplash.com/photo-1572490122747-3968b75cc699?q=80&w=900&auto=format&fit=crop",
          rating: 4.7,
          tag: "Sweet"
        },
        {
          name: "Ice Cream Sundae",
          price: 49,
          desc: "Vanilla sundae dessert",
          image: "https://images.unsplash.com/photo-1563805042-7684c019e1cb?q=80&w=900&auto=format&fit=crop",
          rating: 4.5,
          tag: "Dessert"
        }
      ],
      combo: [
        {
          name: "Cheese Burger Combo",
          price: 239,
          desc: "Burger, fries and cola",
          image: "https://images.unsplash.com/photo-1550317138-10000687a72b?q=80&w=900&auto=format&fit=crop",
          rating: 4.6,
          tag: "Combo"
        },
        {
          name: "Classic Combo Set",
          price: 289,
          desc: "Classic burger combo meal",
          image: "https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?q=80&w=900&auto=format&fit=crop",
          rating: 4.4,
          tag: "Best Seller"
        },
        {
          name: "Double Cheese Combo",
          price: 319,
          desc: "Double patty, fries and drink",
          image: "https://images.unsplash.com/photo-1550317138-10000687a72b?q=80&w=900&auto=format&fit=crop",
          rating: 4.8,
          tag: "Popular"
        }
      ],
      member: [
        {
          name: "VIP Burger Deal",
          price: 99,
          desc: "Special burger price for members",
          image: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=900&auto=format&fit=crop",
          rating: 4.7,
          tag: "Member"
        }
      ],
      limited: [
        {
          name: "Spicy Chicken Bowl",
          price: 79,
          desc: "Limited time rice bowl",
          image: "https://images.unsplash.com/photo-1512058564366-18510be2db19?q=80&w=900&auto=format&fit=crop",
          rating: 4.4,
          tag: "New"
        }
      ],
      hot: [
        {
          name: "Hot Crispy Chicken",
          price: 119,
          desc: "Our hottest selling crispy chicken",
          image: "https://images.unsplash.com/photo-1626645738196-c2a7c87a8f58?q=80&w=900&auto=format&fit=crop",
          rating: 4.8,
          tag: "Hot"
        }
      ],
      chicken: [
        {
          name: "Crispy Chicken Set",
          price: 199,
          desc: "Fried chicken with fries",
          image: "https://images.unsplash.com/photo-1626645738196-c2a7c87a8f58?q=80&w=900&auto=format&fit=crop",
          rating: 4.7,
          tag: "Chicken"
        }
      ],
      breakfast: [
        {
          name: "Morning Sandwich",
          price: 89,
          desc: "Egg and cheese breakfast sandwich",
          image: "https://images.unsplash.com/photo-1481070414801-51fd732d7184?q=80&w=900&auto=format&fit=crop",
          rating: 4.4,
          tag: "Breakfast"
        }
      ],
      snacks: [
        {
          name: "French Fries",
          price: 55,
          desc: "Golden crispy fries",
          image: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?q=80&w=900&auto=format&fit=crop",
          rating: 4.4,
          tag: "Snack"
        }
      ]
    };

    let activeCategory = "rice";

    function renderCategories() {
      const tabs = document.getElementById("categoryTabs");
      tabs.innerHTML = categories.map(cat => {
        const active = cat.key === activeCategory;
        return `
          <button
            onclick="selectCategory('${cat.key}')"
            class="group flex flex-col items-center min-w-[110px] pb-2 border-b-4 transition-all ${
              active
                ? "border-orange-600 text-orange-600"
                : "border-transparent text-[#6d2f1d] hover:text-orange-600"
            }"
          >
            <div class="text-3xl mb-2">${cat.icon}</div>
            <span class="text-sm font-semibold text-center">${cat.label}</span>
          </button>
        `;
      }).join("");
    }

    function renderMenu() {
      const grid = document.getElementById("menuGrid");
      const title = document.getElementById("menuTitle");
      const subtitle = document.getElementById("menuSubtitle");

      const currentCat = categories.find(c => c.key === activeCategory);
      title.textContent = currentCat.label;
      subtitle.textContent = currentCat.subtitle;

      const items = menuData[activeCategory] || [];

      grid.innerHTML = items.map(item => `
        <div class="card w-[280px] md:w-[300px] xl:w-[320px] bg-white border border-[#e6dac8] shadow-md hover:shadow-xl transition-all rounded-[1.75rem] overflow-hidden group">
          <figure class="h-56 bg-[#faf4eb]">
            <img
              src="${item.image}"
              alt="${item.name}"
              class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
            />
          </figure>

          <div class="card-body p-4">
            <div class="flex items-start justify-between gap-3">
              <div>
                <h3 class="card-title text-lg text-[#3d241a]">${item.name}</h3>
                <p class="text-xs text-[#6d2f1d]/60">${item.desc}</p>
              </div>
              <div class="badge badge-outline border-orange-300 text-orange-700">$${item.price}</div>
            </div>

            <div class="flex items-center justify-between mt-3">
              <span class="badge bg-orange-100 text-orange-700 border-0">${item.tag}</span>
              <span class="text-xs text-[#6d2f1d]/60">⭐ ${item.rating}</span>
            </div>

            <div class="card-actions justify-between mt-4">
              <button class="btn btn-outline btn-sm rounded-full border-[#c8b39b] text-[#6d2f1d]">Customize</button>
              <button class="btn btn-sm rounded-full bg-orange-600 hover:bg-orange-700 text-white border-0">+ Add</button>
            </div>
          </div>
        </div>
      `).join("");
    }

    function selectCategory(key) {
      activeCategory = key;
      renderCategories();
      renderMenu();
    }

    renderCategories();
    renderMenu();
  </script>
</body>
</html>
