<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu Management</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-[#f7f4ee] text-base-content">
  <div class="drawer lg:drawer-open">
    <input id="admin-drawer" type="checkbox" class="drawer-toggle" />

    <div class="drawer-content flex flex-col">
      <div class="navbar bg-[#efe5d7]/95 border-b border-[#d8ccb9] shadow-sm px-3 lg:px-8">
        <div class="flex-none lg:hidden"><label for="admin-drawer" class="btn btn-ghost btn-circle">☰</label></div>
        <div class="flex-1"><a class="text-2xl font-extrabold text-orange-600">Menu Management</a></div>
        <div class="flex-none"><button onclick="logoutStaff()" class="btn btn-outline btn-error rounded-full">Logout</button></div>
      </div>

      <main class="p-4 lg:p-8 space-y-6">
        <div class="flex items-center justify-between gap-4 flex-wrap">
          <div>
            <h1 class="text-3xl font-extrabold text-[#3d241a]">Menu Items</h1>
            <p class="text-[#6d2f1d]/70 mt-2">Add, edit, and manage restaurant menu items.</p>
          </div>
          <button class="btn rounded-full bg-orange-600 hover:bg-orange-700 text-white border-0">+ Add New Item</button>
        </div>

        <div class="card bg-white border border-[#e6dac8] shadow-md rounded-[1.75rem]">
          <div class="overflow-x-auto">
            <table class="table">
              <thead>
                <tr>
                  <th>Menu</th>
                  <th>Category</th>
                  <th>Price</th>
                  <th>Status</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Whopper Style Burger</td>
                  <td>Burgers</td>
                  <td>$149</td>
                  <td><span class="badge bg-green-100 text-green-700 border-0">Active</span></td>
                  <td class="flex gap-2">
                    <button class="btn btn-xs rounded-full">Edit</button>
                    <button class="btn btn-xs btn-error rounded-full text-white">Delete</button>
                  </td>
                </tr>
                <tr>
                  <td>Chicken Rice Bowl</td>
                  <td>Rice Dishes</td>
                  <td>$79</td>
                  <td><span class="badge bg-green-100 text-green-700 border-0">Active</span></td>
                  <td class="flex gap-2">
                    <button class="btn btn-xs rounded-full">Edit</button>
                    <button class="btn btn-xs btn-error rounded-full text-white">Delete</button>
                  </td>
                </tr>
                <tr>
                  <td>Chocolate Shake</td>
                  <td>Drinks</td>
                  <td>$59</td>
                  <td><span class="badge bg-amber-100 text-amber-700 border-0">Draft</span></td>
                  <td class="flex gap-2">
                    <button class="btn btn-xs rounded-full">Edit</button>
                    <button class="btn btn-xs btn-error rounded-full text-white">Delete</button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <div class="drawer-side">
      <label for="admin-drawer" class="drawer-overlay"></label>
      <aside class="min-h-full w-72 bg-[#efe5d7] border-r border-[#d8ccb9] p-4">
        <div class="text-2xl font-extrabold text-orange-600 mb-6">Admin Panel</div>
        <div id="admin-sidebar"></div>
      </aside>
    </div>
  </div>

  <script src="../app.js"></script>
  <script>
    requireStaff("admin");
    setupAdminSidebar();
    document.getElementById("admin-sidebar").innerHTML = adminSidebar("menu-items.html");
  </script>
</body>
</html>
