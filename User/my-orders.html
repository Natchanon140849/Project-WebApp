<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    :root{--fh-bg:#f7f4ee;--fh-soft:#efe5d7;--fh-line:#d8ccb9;--fh-line-2:#e6dac8;--fh-brown:#6d2f1d;--fh-brown-2:#3d241a;--fh-orange:#ea580c;--fh-orange-2:#c2410c}
    body{background:var(--fh-bg);color:var(--fh-brown-2)}
    .fh-top{background:#efe5d7f2;border-bottom:1px solid var(--fh-line);backdrop-filter:blur(10px)}
    .fh-card{background:#fff;border:1px solid var(--fh-line-2);border-radius:1.75rem;box-shadow:0 10px 24px rgba(61,36,26,.06)}
    .fh-btn{background:var(--fh-orange)!important;border:none!important;color:#fff!important;border-radius:9999px}
    .fh-btn:hover{background:var(--fh-orange-2)!important}
    .fh-outline{background:#fff!important;border:1px solid #c8b39b!important;color:var(--fh-brown)!important;border-radius:9999px}
  </style>
</head>
<body class="min-h-screen">
  <!-- top bar -->
  <div class="navbar sticky top-0 z-50 px-4 lg:px-8 min-h-16 fh-top">
    <div class="flex-1 items-center gap-2"><a href="customer-dashboard.html" class="btn btn-ghost btn-circle text-xl text-[#6d2f1d]">‹</a><div class="text-2xl font-extrabold text-orange-600">My Orders</div></div>
    <div class="flex-none">
      <a href="cart.html" class="btn btn-ghost btn-circle hover:bg-orange-100">
        <div class="indicator">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#6d2f1d]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4m1.6 8L5.4 5M7 13l-1.3 1.3A1 1 0 006.4 16H19m-12 0a2 2 0 104 0m6 0a2 2 0 104 0"/></svg>
          <span class="badge badge-sm indicator-item bg-orange-600 text-white border-0 js-cart-count">0</span>
        </div>
      </a>
    </div>
  </div>

  <main class="max-w-5xl mx-auto p-4 lg:p-8 space-y-4">
    <div class="flex justify-between items-center gap-4">
      <div><h1 class="text-3xl font-extrabold text-[#3d241a]">Order History</h1><p class="text-[#8b6b5c]">Your paid orders appear here.</p></div>
      <a href="customer-dashboard.html" class="btn fh-btn">Order More</a>
    </div>

    <div id="empty" class="fh-card hidden"><div class="p-8 text-center"><h2 class="text-2xl font-bold text-[#3d241a]">No orders yet</h2><p class="text-[#8b6b5c]">Complete a payment to see your orders.</p></div></div>
    <div id="list" class="space-y-4"></div>
  </main>

  <!-- review modal -->
  <dialog id="reviewModal" class="modal">
    <div class="modal-box max-w-lg fh-card">
      <h3 class="text-2xl font-extrabold text-[#3d241a]">Write Review</h3>
      <p id="reviewItem" class="text-[#8b6b5c] mt-1"></p>

      <!-- star rating -->
      <div class="mt-4">
        <div class="text-sm font-semibold text-[#6d2f1d] mb-2">Rating</div>
        <div class="rating rating-lg">
          <input type="radio" name="reviewStars" class="mask mask-star-2 bg-orange-400" value="1">
          <input type="radio" name="reviewStars" class="mask mask-star-2 bg-orange-400" value="2">
          <input type="radio" name="reviewStars" class="mask mask-star-2 bg-orange-400" value="3">
          <input type="radio" name="reviewStars" class="mask mask-star-2 bg-orange-400" value="4">
          <input type="radio" name="reviewStars" class="mask mask-star-2 bg-orange-400" value="5">
        </div>
      </div>

      <!-- review text -->
      <div class="mt-4">
        <div class="text-sm font-semibold text-[#6d2f1d] mb-2">Review</div>
        <textarea id="reviewText" class="textarea textarea-bordered w-full rounded-2xl border-[#d8ccb9] h-28" placeholder="Write your review..."></textarea>
      </div>

      <div class="modal-action">
        <form method="dialog"><button class="btn fh-outline">Cancel</button></form>
        <button id="saveReview" class="btn fh-btn">Save Review</button>
      </div>
    </div>
  </dialog>

  <script src="app.js"></script>
  <script>
    const empty=document.getElementById("empty"),list=document.getElementById("list"),reviewModal=document.getElementById("reviewModal"),reviewItem=document.getElementById("reviewItem"),reviewText=document.getElementById("reviewText"),saveReview=document.getElementById("saveReview");
    let currentReviewKey="",currentOrderId="",currentItemName="",currentItemLabel="";

    const notes=x=>itemNotes(x).length?`<div class="text-sm text-[#8b6b5c] mt-1">${itemNotes(x).join(" • ")}</div>`:"";
    const reviewBox=r=>r?`<div class="mt-3 rounded-2xl border border-[#e6dac8] bg-[#faf6ef] p-3"><div class="text-orange-600 font-bold">${starText(+r.stars||0)}</div><div class="text-sm text-[#3d241a] mt-1">${r.text||"-"}</div></div>`:"";
    function itemRow(x,o,rowIndex){
      const reviewKey=`${o.id}-${rowIndex}`,r=getReview(reviewKey);
      return `<div class="py-3 border-b border-[#efe5d7] last:border-0 flex flex-col md:flex-row md:justify-between gap-3">
        <div class="flex-1">
          <div class="font-bold text-[#3d241a]">${itemLabel(x)}</div>
          ${notes(x)}
          ${reviewBox(r)}
        </div>
        <div class="text-sm md:text-right text-[#6d2f1d]">
          <div>Qty: ${x.qty}</div>
          <div>Unit: ${money(x.unitPrice)}</div>
          <div class="font-bold text-orange-600">Total: ${money(x.totalPrice)}</div>
          ${o.status==="DONE"?`<button onclick='openReview(${JSON.stringify(reviewKey)},${JSON.stringify(o.id)},${JSON.stringify(x.name)},${JSON.stringify(itemLabel(x))})' class="btn btn-sm mt-3 ${r?"fh-outline":"fh-btn"}">${r?"Edit Review":"Review"}</button>`:""}
        </div>
      </div>`;
    }
    const card=o=>`<div class="fh-card"><div class="p-6">
      <div class="flex flex-col md:flex-row md:justify-between gap-3">
        <div>
          <div class="flex flex-wrap items-center gap-2"><h2 class="text-2xl font-extrabold text-[#3d241a]">${o.id}</h2><span class="badge ${statusBadge(o.status)}">${o.status}</span></div>
          <div class="text-sm text-[#8b6b5c] mt-1">Time: ${o.time}</div>
          <div class="text-sm text-[#8b6b5c]">Payment: ${o.method}${o.paymentDetail?` (${o.paymentDetail})`:""}</div>
        </div>
        <div class="md:text-right"><div class="text-sm text-[#8b6b5c]">Order Total</div><div class="text-3xl font-extrabold text-orange-600">${money(o.total)}</div></div>
      </div>
      <div class="divider my-2"></div>
      ${o.items.map((x,i)=>itemRow(x,o,i)).join("")}
    </div></div>`;

    function render(){
      const a=getOrders();
      empty.classList.toggle("hidden",!!a.length);
      list.innerHTML=a.map(card).join("");
      updateBadges();
    }

    function setStars(n){
      document.querySelectorAll('[name="reviewStars"]').forEach(x=>x.checked=+x.value===+n);
    }
    function openReview(reviewKey,orderId,itemName,itemLabelText){
      currentReviewKey=reviewKey;currentOrderId=orderId;currentItemName=itemName;currentItemLabel=itemLabelText;
      const r=getReview(reviewKey);
      reviewItem.textContent=itemLabelText;
      reviewText.value=r?.text||"";
      setStars(r?.stars||5);
      reviewModal.showModal();
    }

    saveReview.onclick=()=>{
      const stars=document.querySelector('[name="reviewStars"]:checked')?.value;
      const text=reviewText.value.trim();
      if(!stars)return alert("Please choose a star rating.");
      if(!text)return alert("Please write your review.");
      addReview({reviewKey:currentReviewKey,orderId:currentOrderId,itemName:currentItemName,itemLabel:currentItemLabel,stars,text});
      reviewModal.close();
      render();
    };

    render();
    setInterval(render,2000);
    window.openReview=openReview;
  </script>
</body>
</html>
