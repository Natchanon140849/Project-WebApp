<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Foodie House - Cook Order</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style> body { font-family: 'Nunito', sans-serif; } </style>
</head>
<body class="flex h-screen bg-[#fcf9f2] text-stone-800">
  <aside class="w-56 bg-white border-r border-stone-200 flex flex-col justify-between shrink-0">
    <div>
      <h1 class="h-20 px-6 flex items-center text-2xl font-black border-b border-stone-200 text-[#ea580c] shrink-0">Foodie House</h1>
      <nav class="p-4 flex flex-col gap-2">
        <a href="./dashboard_Cook.html" class="px-4 py-2.5 text-stone-500 font-medium hover:bg-stone-50 hover:text-stone-900 rounded-lg transition">
          Menu
        </a>
        <a href="#" class="px-4 py-2.5 bg-orange-50 text-[#ea580c] font-bold rounded-lg border-l-4 border-[#ea580c] transition">
          Order
        </a>
      </nav>
    </div>
    <div class="p-4 border-t border-stone-200">
      <a href="" class="block text-center py-2.5 text-white bg-[#452b1f] hover:bg-[#2d1b13] rounded-lg font-bold transition shadow-sm">
        Logout
      </a>
    </div>
  </aside>
  <main class="flex-1 flex flex-col overflow-hidden">
    <header class="h-20 px-8 border-b border-stone-200 flex justify-between items-center bg-white shrink-0">
      <input type="text" placeholder="Search orders..." class="bg-[#fcf9f2] border-transparent rounded-lg px-4 py-2 w-72 outline-none focus:bg-white focus:border-[#ea580c] focus:ring-2 focus:ring-orange-200 transition">
    </header>
    <div class="p-8 overflow-auto flex-1">
      <div class="bg-white border border-stone-200 rounded-2xl p-7 max-w-3xl shadow-sm">
        <div class="flex justify-between items-center border-b border-stone-100 pb-5 mb-6">
          <div class="bg-[#ea580c] text-white px-5 py-1.5 font-bold rounded-lg text-lg shadow-sm">
            Order 1
          </div>
          <div class="text-stone-500 font-medium">
            Order Time: 12:30
          </div>
        </div>
        <div class="flex flex-col gap-6 pl-2 mb-8">
          <div class="flex items-center gap-4">
            <span class="flex-1 font-bold text-xl text-stone-700">Pad Thai</span>
            <div class="w-9 h-9 bg-orange-100 text-[#ea580c] rounded-full flex items-center justify-center font-bold">1</div>
            <span class="text-sm font-medium text-stone-400">Comments</span>
            <input type="text" class="bg-[#fcf9f2] border border-stone-200 rounded-lg px-3 py-2 w-56 outline-none focus:bg-white focus:border-[#ea580c] transition">
          </div>
          <div class="flex items-center gap-4">
            <span class="flex-1 font-bold text-xl text-stone-700">Khao Moo Tod</span>
            <div class="w-9 h-9 bg-orange-100 text-[#ea580c] rounded-full flex items-center justify-center font-bold">1</div>
            <span class="text-sm font-medium text-stone-400">Comments</span>
            <input type="text" class="bg-[#fcf9f2] border border-stone-200 rounded-lg px-3 py-2 w-56 outline-none focus:bg-white focus:border-[#ea580c] transition">
          </div>
        </div>
        <div class="flex items-center gap-3 pt-6 border-t border-stone-100">
          <span class="font-bold text-stone-400 mr-2 uppercase text-sm tracking-wider">Update</span>
          <button class="bg-rose-50 text-rose-600 border border-rose-200 hover:bg-rose-100 px-5 py-2.5 rounded-lg font-bold transition">Pending</button>
          <button class="bg-[#ea580c] text-white hover:bg-orange-600 px-5 py-2.5 rounded-lg font-bold transition shadow-sm">Cooking</button>
          <button class="bg-emerald-50 text-emerald-600 border border-emerald-200 hover:bg-emerald-100 px-5 py-2.5 rounded-lg font-bold transition">Serving</button>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
