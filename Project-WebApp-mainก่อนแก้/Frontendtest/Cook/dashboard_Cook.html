<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Foodie House - Cook Menu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style> body { font-family: 'Nunito', sans-serif; } </style>
</head>
<body class="flex h-screen bg-[#fcf9f2] text-stone-800">
  <aside class="w-56 bg-white border-r border-stone-200 flex flex-col justify-between shrink-0">
    <div>
      <h1 class="h-20 px-6 flex items-center text-2xl font-black border-b border-stone-200 text-[#ea580c] shrink-0">Foodie House</h1>
      <nav class="p-4 flex flex-col gap-2">
        <a href="#" class="px-4 py-2.5 bg-orange-50 text-[#ea580c] font-bold rounded-lg border-l-4 border-[#ea580c] transition">
          Menu
        </a>
        <a href="./Order_cook.html" class="px-4 py-2.5 text-stone-500 font-medium hover:bg-stone-50 hover:text-stone-900 rounded-lg transition">
          Order
        </a>
      </nav>
    </div>
    <div class="p-4 border-t border-stone-200">
      <a href="" class="block text-center py-2.5 text-white bg-[#452b1f] hover:bg-[#2d1b13] rounded-lg font-bold transition shadow-sm">
        Logout
      </a>
    </div>
  </aside>
  <main class="flex-1 flex flex-col overflow-hidden">
    <header class="h-20 px-8 border-b border-stone-200 flex justify-between items-center bg-white shrink-0">
      <input type="text" placeholder="Search menu..." class="bg-[#fcf9f2] border-transparent rounded-lg px-4 py-2 w-72 outline-none focus:bg-white focus:border-[#ea580c] focus:ring-2 focus:ring-orange-200 transition">
    </header>
    <div class="p-8 overflow-auto flex-1">
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <div class="bg-white border border-stone-200 rounded-2xl flex flex-col shadow-sm hover:shadow-md transition duration-300">
          <img src="/Frontend/Cook/image/padthai.png" alt="Pad Thai" class="h-40 w-full object-cover rounded-t-2xl">
          <div class="p-5 flex justify-between items-start">
            <div>
              <div class="font-bold text-lg text-stone-800">Pad Thai</div>
              <div class="text-sm text-amber-500 font-bold mt-1">★ 5</div>
            </div>
            <div class="font-black text-[#ea580c] text-lg">$19</div>
          </div>
        </div>
        <div class="bg-white border border-stone-200 rounded-2xl flex flex-col shadow-sm hover:shadow-md transition duration-300">
          <img src="/Frontend/Cook/image/khaomootod.png" alt="Khao Moo Tod" class="h-40 w-full object-cover rounded-t-2xl">
          <div class="p-5 flex justify-between items-start">
            <div>
              <div class="font-bold text-lg text-stone-800">Khao Moo Tod</div>
              <div class="text-sm text-amber-500 font-bold mt-1">★ 4</div>
            </div>
            <div class="font-black text-[#ea580c] text-lg">$19</div>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
