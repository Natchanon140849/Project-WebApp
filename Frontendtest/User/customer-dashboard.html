    let activeCategory = "rice";

    function renderCategories() {
      const tabs = document.getElementById("categoryTabs");
      tabs.innerHTML = categories.map(cat => {
        const active = cat.key === activeCategory;
        return `
          <button
            onclick="selectCategory('${cat.key}')"
            class="group flex flex-col items-center min-w-[110px] pb-2 border-b-4 transition-all ${
              active
                ? "border-orange-600 text-orange-600"
                : "border-transparent text-[#6d2f1d] hover:text-orange-600"
            }"
          >
            <div class="text-3xl mb-2">${cat.icon}</div>
            <span class="text-sm font-semibold text-center">${cat.label}</span>
          </button>
        `;
      }).join("");
    }

    function renderMenu() {
      const grid = document.getElementById("menuGrid");
      const title = document.getElementById("menuTitle");
      const subtitle = document.getElementById("menuSubtitle");

      const currentCat = categories.find(c => c.key === activeCategory);
      title.textContent = currentCat.label;
      subtitle.textContent = currentCat.subtitle;

      const items = menuData[activeCategory] || [];

      grid.innerHTML = items.map(item => `
        <div class="card w-[280px] md:w-[300px] xl:w-[320px] bg-white border border-[#e6dac8] shadow-md hover:shadow-xl transition-all rounded-[1.75rem] overflow-hidden group">

              src="${item.image}"
              alt="${item.name}"
              class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
            />
          </figure>

          <div class="card-body p-4">
            <div class="flex items-start justify-between gap-3">
              <div>
                <h3 class="card-title text-lg text-[#3d241a]">${item.name}</h3>
                <p class="text-xs text-[#6d2f1d]/60">${item.desc}</p>
              </div>
              <div class="badge badge-outline border-orange-300 text-orange-700">$${item.price}</div>
            </div>

            <div class="flex items-center justify-between mt-3">
              <span class="badge bg-orange-100 text-orange-700 border-0">${item.tag}</span>
              <span class="text-xs text-[#6d2f1d]/60">⭐ ${item.rating}</span>
            </div>

            <div class="card-actions justify-between mt-4">
              <button class="btn btn-outline btn-sm rounded-full border-[#c8b39b] text-[#6d2f1d]">Customize</button>

        </div>
      `).join("");
    }

    function selectCategory(key) {
      activeCategory = key;
      renderCategories();
      renderMenu();
    }

    renderCategories();
    renderMenu();
  </script>

<script>
// ===== Shared Store =====
function getCart(){return JSON.parse(localStorage.getItem("cart")||"[]")}
function saveCart(c){localStorage.setItem("cart",JSON.stringify(c))}
function getOrders(){return JSON.parse(localStorage.getItem("orders")||"[]")}
function saveOrders(o){localStorage.setItem("orders",JSON.stringify(o))}

// ===== Cart Actions =====
function addToCart(item){
  const c=getCart();
  const f=c.find(i=>i.name===item.name);
  if(f) f.qty++; else c.push({...item, qty:1});
  saveCart(c);
  updateCartUI();
  showToast("Added to cart");
}

function updateCartUI(){
  const c=getCart();
  const count=c.reduce((s,i)=>s+i.qty,0);
  const el=document.querySelector(".indicator-item");
  if(el) el.textContent=count;
}

// ===== Toast =====
function showToast(msg){
  const toast=document.createElement("div");
  toast.className="toast toast-top toast-end z-[9999]";
  toast.innerHTML=`<div class="alert alert-success"><span>${msg}</span></div>`;
  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(),1500);
}

// ===== Hook Add Buttons without changing HTML =====
const __oldRenderMenu = renderMenu;
renderMenu = function(){
  __oldRenderMenu();
  setTimeout(()=>{
    document.querySelectorAll(".card-actions button:last-child")
      .forEach((btn,i)=>{
        const item = menuData[activeCategory][i];
        btn.onclick = ()=>addToCart(item);
      });
    updateCartUI();
  }, 0);
};

updateCartUI();
</script>
