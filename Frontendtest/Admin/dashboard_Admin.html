<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-[#f7f4ee] text-base-content">
  <div class="drawer lg:drawer-open">
    <input id="admin-drawer" type="checkbox" class="drawer-toggle" />

    <div class="drawer-content flex flex-col">
      <div class="navbar bg-[#efe5d7]/95 border-b border-[#d8ccb9] shadow-sm px-3 lg:px-8">
        <div class="flex-none lg:hidden">
          <label for="admin-drawer" class="btn btn-ghost btn-circle">☰</label>
        </div>
        <div class="flex-1">
          <a class="text-2xl lg:text-3xl font-extrabold tracking-tight text-orange-600">Foodie House Admin</a>
        </div>
        <div class="flex-none">
          <button onclick="logoutStaff()" class="btn btn-outline btn-error rounded-full">Logout</button>
        </div>
      </div>

      <main class="p-4 lg:p-8 space-y-6">
        <div>
          <h1 class="text-3xl md:text-4xl font-extrabold text-[#3d241a]">Dashboard Overview</h1>
          <p class="text-[#6d2f1d]/70 mt-2">Manage orders, menus, and restaurant operations.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
          <div class="card bg-white border border-[#e6dac8] shadow-md rounded-[1.75rem]">
            <div class="card-body">
              <p class="text-sm text-[#6d2f1d]/60">Total Orders</p>
              <h2 class="text-4xl font-extrabold text-orange-600">128</h2>
            </div>
          </div>
          <div class="card bg-white border border-[#e6dac8] shadow-md rounded-[1.75rem]">
            <div class="card-body">
              <p class="text-sm text-[#6d2f1d]/60">Revenue</p>
              <h2 class="text-4xl font-extrabold text-orange-600">$2,490</h2>
            </div>
          </div>
          <div class="card bg-white border border-[#e6dac8] shadow-md rounded-[1.75rem]">
            <div class="card-body">
              <p class="text-sm text-[#6d2f1d]/60">Active Staff</p>
              <h2 class="text-4xl font-extrabold text-orange-600">12</h2>
            </div>
          </div>
        </div>

        <div class="card bg-white border border-[#e6dac8] shadow-md rounded-[1.75rem]">
          <div class="card-body">
            <div class="flex items-center justify-between mb-2">
              <h2 class="card-title text-[#3d241a] text-2xl">Recent Orders</h2>
              <a href="orders.html" class="btn btn-sm rounded-full bg-orange-600 hover:bg-orange-700 text-white border-0">View All</a>
            </div>

            <div class="overflow-x-auto">
              <table class="table">
                <thead>
                  <tr>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Status</th>
                    <th>Total</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>#1001</td>
                    <td>Table A01</td>
                    <td><span class="badge bg-orange-100 text-orange-700 border-0">Preparing</span></td>
                    <td>$45</td>
                  </tr>
                  <tr>
                    <td>#1002</td>
                    <td>Table B03</td>
                    <td><span class="badge bg-green-100 text-green-700 border-0">Served</span></td>
                    <td>$32</td>
                  </tr>
                  <tr>
                    <td>#1003</td>
                    <td>Table C02</td>
                    <td><span class="badge bg-amber-100 text-amber-700 border-0">Pending</span></td>
                    <td>$28</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div class="drawer-side">
      <label for="admin-drawer" class="drawer-overlay"></label>
      <aside class="min-h-full w-72 bg-[#efe5d7] border-r border-[#d8ccb9] p-4">
        <div class="text-2xl font-extrabold text-orange-600 mb-6">Admin Panel</div>
        <div id="admin-sidebar"></div>
      </aside>
    </div>
  </div>

  <script src="../app.js"></script>
  <script>
    requireStaff("admin");
    setupAdminSidebar();
    document.getElementById("admin-sidebar").innerHTML = adminSidebar("dashboard_Admin.html");
  </script>
</body>
</html>
