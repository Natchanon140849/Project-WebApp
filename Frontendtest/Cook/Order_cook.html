<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cook Orders</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-[#f7f4ee] text-base-content">
  <div class="navbar bg-[#efe5d7]/95 border-b border-[#d8ccb9] shadow-sm px-3 lg:px-8">
    <div class="flex-1">
      <a class="text-2xl font-extrabold text-orange-600">Cook Orders</a>
    </div>
    <div class="flex-none gap-2">
      <a href="dashboard_Cook.html" class="btn rounded-full bg-white border border-[#d8ccb9] text-[#6d2f1d]">Back</a>
      <button onclick="logoutStaff()" class="btn btn-outline btn-error rounded-full">Logout</button>
    </div>
  </div>

  <main class="max-w-7xl mx-auto p-4 lg:p-8">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div class="card bg-white border border-[#e6dac8] shadow-md rounded-[1.75rem]">
        <div class="card-body">
          <div class="flex items-start justify-between">
            <div>
              <h3 class="card-title text-[#3d241a]">Order #1001</h3>
              <p class="text-sm text-[#6d2f1d]/60">Table A01</p>
            </div>
            <span class="badge bg-amber-100 text-amber-700 border-0">Pending</span>
          </div>
          <div class="space-y-2 mt-3">
            <div class="flex justify-between"><span>Chicken Rice Bowl</span><span>x2</span></div>
            <div class="flex justify-between"><span>Iced Cola</span><span>x1</span></div>
          </div>
          <div class="card-actions justify-end mt-4">
            <button class="btn btn-sm rounded-full bg-orange-600 text-white border-0">Cooking</button>
            <button class="btn btn-sm rounded-full bg-green-600 text-white border-0">Serving</button>
          </div>
        </div>
      </div>

      <div class="card bg-white border border-[#e6dac8] shadow-md rounded-[1.75rem]">
        <div class="card-body">
          <div class="flex items-start justify-between">
            <div>
              <h3 class="card-title text-[#3d241a]">Order #1002</h3>
              <p class="text-sm text-[#6d2f1d]/60">Table B03</p>
            </div>
            <span class="badge bg-orange-100 text-orange-700 border-0">Cooking</span>
          </div>
          <div class="space-y-2 mt-3">
            <div class="flex justify-between"><span>BBQ Bacon Burger</span><span>x1</span></div>
            <div class="flex justify-between"><span>French Fries</span><span>x1</span></div>
          </div>
          <div class="card-actions justify-end mt-4">
            <button class="btn btn-sm rounded-full bg-green-600 text-white border-0">Serving</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="../app.js"></script>
  <script>
    requireStaff("cook");
    setCookHeader();
  </script>
</body>
</html>
