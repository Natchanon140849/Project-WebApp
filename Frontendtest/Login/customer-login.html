<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Login</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-[#f7f4ee] text-base-content">
  <div class="navbar sticky top-0 z-50 bg-[#efe5d7]/95 backdrop-blur border-b border-[#d8ccb9] px-3 lg:px-8 min-h-16 shadow-sm">
    <div class="flex-1 items-center gap-3">
      <button class="btn btn-ghost btn-circle text-xl">☰</button>
      <a class="text-2xl lg:text-3xl font-extrabold tracking-tight text-orange-600">Foodie House</a>
    </div>
    <div class="flex-none">
      <a href="staff-login.html" class="btn btn-outline rounded-full border-[#c8b39b] text-[#6d2f1d] hover:bg-[#f7efe4]">
        Staff Login
      </a>
    </div>
  </div>

  <div class="min-h-[calc(100vh-64px)] px-4 lg:px-8 py-8 flex items-center">
    <div class="w-full max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8 items-center">
      <div class="space-y-6">
        <div class="badge bg-orange-100 text-orange-700 border-0 px-4 py-3">Customer Access</div>
        <div>
          <h1 class="text-4xl md:text-5xl xl:text-6xl font-extrabold leading-tight text-[#3d241a]">
            Start your <span class="block text-orange-600">food journey</span>
          </h1>
          <p class="mt-4 text-base md:text-lg text-[#6d2f1d]/70 max-w-xl">
            Login with your table and username to browse menus, place orders, and enjoy a smoother dining experience.
          </p>
        </div>
      </div>

      <div class="flex justify-center lg:justify-end">
        <div class="card w-full max-w-md bg-white border border-[#e6dac8] shadow-xl rounded-[2rem] overflow-hidden">
          <div class="h-32 bg-gradient-to-r from-[#6d2f1d] via-orange-600 to-amber-500 relative">
            <div class="absolute bottom-5 left-6 text-white">
              <p class="text-sm uppercase tracking-[0.25em] opacity-90">Foodie House</p>
              <h2 class="text-3xl font-extrabold">Table Login</h2>
            </div>
          </div>

          <div class="card-body p-6 md:p-8">
            <div class="space-y-4">
              <div>
                <label class="label"><span class="label-text font-semibold text-[#6d2f1d]">Table ID</span></label>
                <input id="tableId" type="text" placeholder="A01" class="input w-full rounded-2xl bg-white border-[#d8ccb9]" />
              </div>
              <div>
                <label class="label"><span class="label-text font-semibold text-[#6d2f1d]">Username</span></label>
                <input id="customerName" type="text" placeholder="your name..." class="input w-full rounded-2xl bg-white border-[#d8ccb9]" />
              </div>
            </div>

            <div class="mt-6">
              <button onclick="customerLogin()" class="btn w-full rounded-full bg-orange-600 hover:bg-orange-700 text-white border-0 shadow-md">
                Start Ordering
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../app.js"></script>
</body>
</html>
