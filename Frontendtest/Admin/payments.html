<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payments</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-[#f7f4ee] text-base-content">
  <div class="drawer lg:drawer-open">
    <input id="admin-drawer" type="checkbox" class="drawer-toggle" />

    <div class="drawer-content flex flex-col">
      <div class="navbar bg-[#efe5d7]/95 border-b border-[#d8ccb9] shadow-sm px-3 lg:px-8">
        <div class="flex-none lg:hidden"><label for="admin-drawer" class="btn btn-ghost btn-circle">☰</label></div>
        <div class="flex-1"><a class="text-2xl font-extrabold text-orange-600">Payments</a></div>
        <div class="flex-none"><button onclick="logoutStaff()" class="btn btn-outline btn-error rounded-full">Logout</button></div>
      </div>

      <main class="p-4 lg:p-8 space-y-6">
        <div>
          <h1 class="text-3xl font-extrabold text-[#3d241a]">Payment Records</h1>
          <p class="text-[#6d2f1d]/70 mt-2">View all payment history.</p>
        </div>

        <div class="card bg-white border border-[#e6dac8] shadow-md rounded-[1.75rem]">
          <div class="overflow-x-auto">
            <table class="table">
              <thead>
                <tr><th>Payment ID</th><th>Order ID</th><th>Method</th><th>Amount</th><th>Status</th></tr>
              </thead>
              <tbody>
                <tr><td>PAY-001</td><td>#1001</td><td>Cash</td><td>$23</td><td><span class="badge bg-green-100 text-green-700 border-0">Paid</span></td></tr>
                <tr><td>PAY-002</td><td>#1002</td><td>Card</td><td>$32</td><td><span class="badge bg-green-100 text-green-700 border-0">Paid</span></td></tr>
                <tr><td>PAY-003</td><td>#1003</td><td>QR</td><td>$28</td><td><span class="badge bg-amber-100 text-amber-700 border-0">Pending</span></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <div class="drawer-side">
      <label for="admin-drawer" class="drawer-overlay"></label>
      <aside class="min-h-full w-72 bg-[#efe5d7] border-r border-[#d8ccb9] p-4">
        <div class="text-2xl font-extrabold text-orange-600 mb-6">Admin Panel</div>
        <div id="admin-sidebar"></div>
      </aside>
    </div>
  </div>

  <script src="../app.js"></script>
  <script>
    requireStaff("admin");
    setupAdminSidebar();
    document.getElementById("admin-sidebar").innerHTML = adminSidebar("payments.html");
  </script>
</body>
</html>
