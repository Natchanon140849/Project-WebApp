<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-[#f7f4ee] text-base-content">
  <div class="drawer lg:drawer-open">
    <input id="admin-drawer" type="checkbox" class="drawer-toggle" />

    <div class="drawer-content flex flex-col">
      <div class="navbar bg-[#efe5d7]/95 border-b border-[#d8ccb9] shadow-sm px-3 lg:px-8">
        <div class="flex-none lg:hidden">
          <label for="admin-drawer" class="btn btn-ghost btn-circle">☰</label>
        </div>
        <div class="flex-1">
          <a class="text-2xl font-extrabold text-orange-600">Profile</a>
        </div>
        <div class="flex-none">
          <button onclick="logoutStaff()" class="btn btn-outline btn-error rounded-full">Logout</button>
        </div>
      </div>

      <main class="p-4 lg:p-8 space-y-6">
        <div>
          <h1 class="text-3xl font-extrabold text-[#3d241a]">Admin Profile</h1>
          <p class="text-[#6d2f1d]/70 mt-2">Manage account information.</p>
        </div>

        <div class="max-w-3xl card bg-white border border-[#e6dac8] shadow-md rounded-[1.75rem]">
          <div class="card-body p-6">
            <div class="flex items-center gap-4">
              <div class="avatar placeholder">
                <div class="bg-orange-600 text-white rounded-full w-20">
                  <span class="text-2xl">A</span>
                </div>
              </div>
              <div>
                <h2 class="text-2xl font-extrabold text-[#3d241a]">Admin User</h2>
                <p class="text-[#6d2f1d]/70">admin01</p>
              </div>
            </div>

            <div class="divider"></div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="label"><span class="label-text font-semibold">Full Name</span></label>
                <input type="text" value="Admin User" class="input w-full rounded-2xl border-[#d8ccb9]" />
              </div>
              <div>
                <label class="label"><span class="label-text font-semibold">Email</span></label>
                <input type="email" value="admin@foodiehouse.com" class="input w-full rounded-2xl border-[#d8ccb9]" />
              </div>
              <div>
                <label class="label"><span class="label-text font-semibold">Role</span></label>
                <input type="text" value="Administrator" class="input w-full rounded-2xl border-[#d8ccb9]" />
              </div>
              <div>
                <label class="label"><span class="label-text font-semibold">Phone</span></label>
                <input type="text" value="+1 234 567 890" class="input w-full rounded-2xl border-[#d8ccb9]" />
              </div>
            </div>

            <div class="card-actions justify-end mt-6">
              <button class="btn rounded-full bg-orange-600 hover:bg-orange-700 text-white border-0">Save Changes</button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div class="drawer-side">
      <label for="admin-drawer" class="drawer-overlay"></label>
      <aside class="min-h-full w-72 bg-[#efe5d7] border-r border-[#d8ccb9] p-4">
        <div class="text-2xl font-extrabold text-orange-600 mb-6">Admin Panel</div>
        <ul class="menu gap-2">
          <li><a href="dashboard_Admin.html" class="rounded-2xl">Dashboard</a></li>
          <li><a href="menu-items.html" class="rounded-2xl">Menu Management</a></li>
          <li><a href="orders.html" class="rounded-2xl">Orders</a></li>
          <li><a href="payments.html" class="rounded-2xl">Payments</a></li>
          <li><a href="reviews.html" class="rounded-2xl">Reviews</a></li>
          <li><a href="profile.html" class="rounded-2xl bg-white shadow-sm">Profile</a></li>
        </ul>
      </aside>
    </div>
  </div>

  <script src="app-auth.js"></script>
  <script>
    requireStaff("admin");
    setupAdminSidebar();
  </script>
</body>
</html>
