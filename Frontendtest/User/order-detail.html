<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Detail</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-[#f7f4ee]">
  <div class="navbar bg-[#efe5d7]/95 border-b border-[#d8ccb9] px-3 lg:px-8 shadow-sm">
    <div class="flex-1"><a class="text-2xl font-extrabold text-orange-600">Order Detail</a></div>
    <div class="flex-none gap-2">
      <a href="my-orders.html" class="btn rounded-full bg-white border border-[#d8ccb9] text-[#6d2f1d]">Back</a>
      <button onclick="logoutCustomer()" class="btn btn-outline btn-error rounded-full">Logout</button>
    </div>
  </div>

  <main class="max-w-4xl mx-auto p-4 lg:p-8">
    <div class="card bg-white border border-[#e6dac8] shadow-md rounded-[1.75rem]">
      <div class="card-body">
        <h1 class="text-3xl font-extrabold text-[#3d241a]">Order #1001</h1>
        <p class="text-[#6d2f1d]/70">Status: Preparing</p>
        <div class="divider"></div>
        <div class="space-y-3">
          <div class="flex justify-between"><span>Chicken Rice Bowl × 2</span><span>$18</span></div>
          <div class="flex justify-between"><span>Iced Cola × 1</span><span>$5</span></div>
          <div class="flex justify-between font-bold text-orange-600"><span>Total</span><span>$23</span></div>
        </div>
      </div>
    </div>
  </main>

  <script src="../app.js"></script>
  <script>
    requireCustomer();
  </script>
</body>
</html>
